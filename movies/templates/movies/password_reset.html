{% extends 'movies/base.html' %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 1.5rem; text-align: center;">🔐 Восстановление пароля</h2>
    <p style="margin-bottom: 1.5rem; color: #666;">Забыли пароль? Введите ваш email, и мы отправим инструкции для восстановления.</p>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="id_email" style="display: block; margin-bottom: 0.5rem;">📧 Email адрес</label>
            <input type="email" name="email" id="id_email" class="form-control"
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px;"
                   required autofocus>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
            📧 Отправить инструкции
        </button>
    </form>

    <hr style="margin: 1.5rem 0;">

    <p style="text-align: center;">
        <a href="{% url 'login' %}" style="color: #667eea;">← Вернуться к входу</a>
    </p>
</div>
{% endblock %}

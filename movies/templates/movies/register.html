{% extends 'movies/base.html' %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px;">
    <h2 style="margin-bottom: 1rem;">Регистрация</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <small style="color: red;">{{ field.errors|join:", " }}</small>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 1rem; text-align: center;">
        Уже есть аккаунт? <a href="{% url 'login' %}">Войдите</a>
    </p>
</div>
{% endblock %}

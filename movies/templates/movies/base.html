<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>{% block title %}Коллекция фильмов{% endblock %}</title>
    <style>
        /* RESET и глобальные стили */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
        }

        /* Навбар - адаптивный */
        .navbar {
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        .navbar-brand {
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
            text-decoration: none;
            white-space: nowrap;
        }

        .navbar-nav {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 0.4rem 0.8rem;
            transition: color 0.3s;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        /* Контейнер */
        .container {
            max-width: 1200px;
            width: 95%;
            margin: 1rem auto;
            padding: 0 0.5rem;
            overflow-x: hidden;
        }

        /* Сетка фильмов */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            width: 100%;
        }

        .movie-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
            width: 100%;
        }

        .movie-card:hover {
            transform: translateY(-3px);
        }

        .movie-poster {
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 3;
            object-fit: cover;
        }

        .movie-info {
            padding: 0.75rem;
        }

        .movie-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 0.3rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .movie-rating {
            color: #fbbf24;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        .movie-genres {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Формы */
        .form-group {
            margin-bottom: 1rem;
            width: 100%;
        }

        .form-control {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        /* Поиск и фильтры */
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .search-form form {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            width: 100%;
        }

        .search-form .form-control {
            width: 100%;
        }

        /* Кнопки */
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        /* Страница деталей фильма */
        .movie-detail-container {
            background: white;
            border-radius: 10px;
            padding: 1rem;
            width: 100%;
            overflow-x: hidden;
        }

        .movie-detail-layout {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
        }

        .movie-poster-container {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
        }

        .movie-poster-container img {
            width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .movie-detail-info {
            flex: 1;
            width: 100%;
        }

        /* Комментарии */
        .comment {
            background: #f7f7f7;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.8rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .replies {
            margin-top: 0.75rem;
            margin-left: 0.75rem;
            padding-left: 0.75rem;
            border-left: 2px solid #667eea;
        }

        .reply {
            background: #e8e8e8;
            padding: 0.5rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }

        /* Пагинация */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.3rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .page-link {
            padding: 0.4rem 0.8rem;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            display: inline-block;
        }

        /* Сообщения */
        .messages {
            margin-bottom: 1rem;
            width: 100%;
        }

        .alert {
            padding: 0.75rem;
            border-radius: 5px;
            margin-bottom: 0.5rem;
            word-wrap: break-word;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Адаптивные стили */
        @media (min-width: 768px) {
            .container {
                padding: 0 1rem;
            }

            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
            }

            .search-form form {
                flex-direction: row;
            }

            .search-form .form-control {
                width: auto;
            }

            .movie-detail-layout {
                flex-direction: row;
                align-items: flex-start;
            }

            .movie-poster-container {
                max-width: 280px;
                margin: 0;
            }
        }

        @media (max-width: 480px) {
            .navbar {
                flex-direction: column;
                text-align: center;
            }

            .navbar-nav {
                justify-content: center;
            }

            .movie-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 0.75rem;
            }

            .movie-title {
                font-size: 0.85rem;
            }

            .movie-rating {
                font-size: 0.75rem;
            }

            .btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.85rem;
            }
        }

        /* Утилиты */
        .text-center {
            text-align: center;
        }

        .w-100 {
            width: 100%;
        }

        .overflow-hidden {
            overflow: hidden;
        }

        img, video, iframe {
            max-width: 100%;
            height: auto;
        }
        /* Дополнительные фиксы для мобильных устройств */
       @media (max-width: 480px) {
        input, select, textarea, button {
            font-size: 16px !important; /* Предотвращает зум на iOS */
        }

        .container {
            width: 100%;
            padding: 0 10px;
        }

        .movie-detail-container {
            padding: 0.75rem;
        }
        /* Дополнительные стили для поиска */
        @media (max-width: 768px) {
            .search-form form {
                flex-direction: column;
                width: 100%;
            }

            .search-form .form-control,
            .search-form .btn {
                width: 100%;
            }
        }

        @media (min-width: 769px) {
            .search-form {
                margin-left: auto;
            }
        }
}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'movie_list' %}" class="navbar-brand">🎬 MovieCollect</a>
        <div class="navbar-nav">
            <a href="{% url 'movie_list' %}" class="nav-link">🎥 Фильмы</a>
            {% if user.is_authenticated %}
                <a href="{% url 'favorites_list' %}" class="nav-link">❤️ Избранное</a>
                <span class="nav-link">👤 {{ user.username|truncatechars:10 }}</span>
                <a href="{% url 'logout' %}" class="nav-link" style="color: #e53e3e;">🚪 Выйти</a>
            {% else %}
                <a href="{% url 'login' %}" class="nav-link">🔑 Вход</a>
                <a href="{% url 'register' %}" class="nav-link">📝 Регистрация</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>
</body>
</html>

{% extends 'movies/base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <h2 style="margin-bottom: 1.5rem; text-align: center;"> Вход в систему</h2>

    <!-- Отображение сообщений об ошибках -->


    <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom: 1rem;">
            <label for="username" style="display: block; margin-bottom: 0.5rem;"> Имя пользователя</label>
            <input type="text" name="username" id="username" class="form-control"
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;"
                   required autofocus>
        </div>

        <div class="form-group" style="margin-bottom: 1.5rem;">
            <label for="password" style="display: block; margin-bottom: 0.5rem;"> Пароль</label>
            <input type="password" name="password" id="password" class="form-control"
                   style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;"
                   required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem; cursor: pointer;">
             Войти
        </button>
    </form>

    <hr style="margin: 1.5rem 0;">

    <p style="text-align: center;">
        Нет аккаунта? <a href="{% url 'register' %}" style="color: #667eea; text-decoration: none;"> Зарегистрируйтесь</a>
    </p>

    <div style="text-align: center; margin-top: 1rem;">
        <a href="{% url 'password_reset' %}" style="color: #667eea; text-decoration: none;">🔑 Забыли пароль?</a>
    </div>
</div>

<!-- JavaScript для отладки -->
<script>
console.log('Страница входа загружена');
console.log('URL формы:', document.querySelector('form')?.action);
</script>
{% endblock %}
